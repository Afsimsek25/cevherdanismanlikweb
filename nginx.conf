server {
    listen 80;
    server_tokens off;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # Link Headers for Agent Discovery
        add_header Link '</.well-known/api-catalog>; rel="api-catalog", </docs/api>; rel="service-doc"';

        # Markdown for Agents
        if ($http_accept ~* "text/markdown") {
            rewrite ^(.*)$ /index.md last;
        }

        # React SPA: Eğer dosya bulunamazsa index.html'e geri dön (fallback)
        try_files $uri $uri/ /index.html;
    }

    # Markdown file explicit location to add Content-Type
    location = /index.md {
        root /usr/share/nginx/html;
        default_type text/markdown;
        add_header x-markdown-tokens "provided";
    }

    # .well-known explicit locations for correct Content-Type
    location = /.well-known/api-catalog {
        root /usr/share/nginx/html;
        default_type application/linkset+json;
    }
    location = /.well-known/mcp/server-card.json {
        root /usr/share/nginx/html;
        default_type application/json;
    }
    location = /.well-known/agent-skills/index.json {
        root /usr/share/nginx/html;
        default_type application/json;
    }
    location = /.well-known/oauth-protected-resource {
        root /usr/share/nginx/html;
        default_type application/json;
    }
    location = /.well-known/openid-configuration {
        root /usr/share/nginx/html;
        default_type application/json;
    }
    location = /.well-known/http-message-signatures-directory {
        root /usr/share/nginx/html;
        default_type application/json;
    }

    # Statik dosyaları önbellekle (CSS, JS, Görseller)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
